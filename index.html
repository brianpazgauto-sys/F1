<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>F1 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--red:#E10600;--red-dark:#9B0400;--bg:#0A0A0A;--surface:#141414;--surface2:#1E1E1E;--border:#2A2A2A;--text:#F0F0F0;--muted:#888;--gold:#FFD700;--silver:#C0C0C0;--bronze:#CD7F32;}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;overflow:hidden}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;background:var(--bg);border-bottom:1px solid var(--border);z-index:10}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;letter-spacing:2px;color:var(--red);text-transform:uppercase}
.logo span{color:var(--text)}
.round-badge{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;display:flex;align-items:center;gap:5px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--red);display:inline-block;animation:pulse 1.2s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.ticker{background:var(--red);padding:5px 0;overflow:hidden;white-space:nowrap}
.ticker-inner{display:inline-block;animation:ticker 35s linear infinite;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;color:#fff;text-transform:uppercase}
@keyframes ticker{0%{transform:translateX(100vw)}100%{transform:translateX(-100%)}}
.app{display:flex;flex-direction:column;height:calc(100vh - 90px)}

/* GLOBE */
.globe-container{position:relative;flex:0 0 240px;overflow:hidden;background:radial-gradient(ellipse at 50% 40%, #0d1b3e 0%, #04080f 100%);touch-action:none}
#globe-canvas{width:100%;height:100%;display:block}
.globe-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,var(--bg) 90%);height:50px;pointer-events:none;z-index:3}
#globe-reset{position:absolute;top:8px;right:8px;z-index:20;background:rgba(10,10,10,0.92);border:1px solid var(--border);color:var(--muted);font-size:11px;padding:4px 10px;border-radius:4px;cursor:pointer;display:none;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;-webkit-tap-highlight-color:transparent}
#globe-reset.vis{display:block}

/* POPUP */
.cpopup{position:absolute;bottom:10px;left:10px;right:10px;background:rgba(16,16,16,0.97);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:none;z-index:20;align-items:center;gap:10px}
.cpopup.show{display:flex}
.pflag{font-size:22px}.pname{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:900;text-transform:uppercase;letter-spacing:1px}
.pmeta{font-size:11px;color:var(--muted);margin-top:2px}
.pclose{font-size:16px;color:var(--muted);cursor:pointer;padding:2px 6px;background:none;border:none;-webkit-tap-highlight-color:transparent}
.pstatus{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:3px;text-transform:uppercase}
.st-done{background:var(--border);color:var(--muted)}.st-current{background:var(--gold);color:#000}.st-upcoming{background:var(--surface2);color:var(--muted)}

/* TABS */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
.tab-btn{flex:1;padding:10px 4px;border:none;background:none;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;color:var(--muted);cursor:pointer;text-transform:uppercase;border-bottom:2px solid transparent;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.tab-btn.active{color:var(--red);border-bottom-color:var(--red)}
.panels{flex:1;overflow:hidden;position:relative}
.panel{position:absolute;inset:0;overflow-y:auto;padding:12px;display:none;-webkit-overflow-scrolling:touch}
.panel.active{display:block}
.panel::-webkit-scrollbar{width:3px}.panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.stitle{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;margin-top:4px;display:flex;align-items:center;gap:8px}
.stitle::after{content:'';flex:1;height:1px;background:var(--border)}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:120px;gap:10px;color:var(--muted);font-size:13px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{background:rgba(225,6,0,0.1);border:1px solid var(--red-dark);border-radius:6px;padding:10px;font-size:12px;color:#ff6b6b;text-align:center;margin:8px 0}
/* CALENDAR */
.rcard{display:flex;gap:10px;align-items:flex-start;padding:10px;border-radius:6px;background:var(--surface);margin-bottom:6px;border-left:3px solid var(--border);cursor:pointer}
.rcard.done{opacity:0.65}.rcard.current{border-left-color:var(--gold);background:rgba(255,215,0,0.04)}
.rcard.current .rname{color:var(--gold)}
.rdate{min-width:36px;text-align:center;font-family:'Barlow Condensed',sans-serif}
.rday{font-size:22px;font-weight:900;line-height:1}.rmonth{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
.rinfo{flex:1}.rround{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.rname{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;text-transform:uppercase;letter-spacing:0.5px;margin:1px 0}
.rcircuit{font-size:11px;color:var(--muted)}.rflag{font-size:18px}
.sbadge{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;background:rgba(225,6,0,0.15);color:var(--red);border:1px solid var(--red-dark);border-radius:3px;padding:1px 5px;text-transform:uppercase;margin-left:6px}
.rresult{font-size:11px;margin-top:3px}.winner{color:var(--gold);font-weight:600}
/* DRIVERS */
.drow{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:6px;margin-bottom:4px;background:var(--surface);border-left:3px solid transparent;cursor:pointer;-webkit-tap-highlight-color:transparent}
.drow:active{background:var(--surface2)}
.pos{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:var(--muted);min-width:22px;text-align:center}
.pos.p1{color:var(--gold)}.pos.p2{color:var(--silver)}.pos.p3{color:var(--bronze)}
.dname{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.dteam{font-size:11px;color:var(--muted);margin-top:1px}
.dpts{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:900}
.ptslbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:600;color:var(--muted);letter-spacing:1px;text-align:right;margin-top:1px}
.ptsbar{height:3px;border-radius:2px;margin-top:4px;background:var(--border);width:60px}
.ptsbarfill{height:100%;border-radius:2px}
/* DRIVER MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:none;align-items:flex-end}
.modal-bg.show{display:flex}
.modal{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.modal-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.modal-flag{font-size:38px}
.modal-dname{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:1px}
.modal-team{font-size:12px;margin-top:2px}
.modal-close{margin-left:auto;font-size:20px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px 8px;-webkit-tap-highlight-color:transparent}
.modal-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.mstat{background:var(--surface2);border-radius:8px;padding:10px;text-align:center}
.mstat-val{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900}
.mstat-lbl{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.season-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.race-hist{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface2);border-radius:6px;margin-bottom:4px}
.rh-round{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--muted);min-width:28px}
.rh-name{flex:1;font-size:12px}
.rh-pos{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;min-width:32px;text-align:right}
.rh-pts{font-size:10px;color:var(--muted);min-width:36px;text-align:right}
/* TEAMS */
.team-card{background:var(--surface);border-radius:8px;margin-bottom:8px;overflow:hidden;border-left:3px solid transparent}
.team-header{display:flex;align-items:center;gap:10px;padding:12px 12px 8px}
.team-pos{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:var(--muted);min-width:26px}
.team-pos.p1{color:var(--gold)}.team-pos.p2{color:var(--silver)}.team-pos.p3{color:var(--bronze)}
.team-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.team-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;text-transform:uppercase;flex:1}
.team-pts-big{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900}
.team-pts-lbl{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.ptsbar2{height:3px;background:var(--border);margin:0 12px 10px}
.ptsbar2fill{height:100%;border-radius:2px}
.team-drivers-row{display:flex;gap:6px;padding:0 12px 12px}
.driver-chip{flex:1;background:var(--surface2);border-radius:6px;padding:8px 10px}
.dc-flag{font-size:15px}.dc-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;margin-top:2px;line-height:1.2}
.dc-pts{font-size:11px;color:var(--muted);margin-top:2px}
/* CIRCUITS */
.csel{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;appearance:none;margin-bottom:12px}
.cdetail{background:var(--surface);border-radius:8px;padding:14px;margin-bottom:8px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sbox{background:var(--surface2);border-radius:6px;padding:8px 10px}
.slabel{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.sval{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;margin-top:2px}
.api-badge{font-size:10px;color:var(--muted);text-align:right;margin-bottom:6px;font-style:italic}
</style>
</head>
<body>

<div class="header">
  <div class="logo">F1 <span>2026</span></div>
  <div class="round-badge"><span class="live-dot"></span><span id="header-round">Cargando...</span></div>
</div>
<div class="ticker"><span class="ticker-inner" id="ticker-text">⏳ Cargando datos en tiempo real...</span></div>

<div class="app">
  <div class="globe-container" id="globe-container">
    <canvas id="globe-canvas"></canvas>
    <div class="globe-overlay"></div>
    <button id="globe-reset" onclick="resetGlobe()">✕ RESET</button>
    <div class="cpopup" id="cpopup">
      <div class="pflag" id="pflag">🏁</div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:6px">
          <div class="pname" id="pname"></div>
          <div class="pstatus" id="pstatus"></div>
        </div>
        <div class="pmeta" id="pmeta"></div>
      </div>
      <button class="pclose" onclick="closePopup()">✕</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="cal" onclick="switchTab(this,'cal')">📅 Cal</button>
    <button class="tab-btn" data-tab="drv" onclick="switchTab(this,'drv')">🏆 Drivers</button>
    <button class="tab-btn" data-tab="con" onclick="switchTab(this,'con')">🔧 Teams</button>
    <button class="tab-btn" data-tab="cir" onclick="switchTab(this,'cir')">🏎 Circuits</button>
  </div>
  <div class="panels">
    <div class="panel active" id="panel-cal"><div class="loading"><div class="spinner"></div>Cargando calendario...</div></div>
    <div class="panel" id="panel-drv"><div class="loading"><div class="spinner"></div>Cargando standings...</div></div>
    <div class="panel" id="panel-con"><div class="loading"><div class="spinner"></div>Cargando constructores...</div></div>
    <div class="panel" id="panel-cir"></div>
  </div>
</div>

<div class="modal-bg" id="dmodal" onclick="closeModal(event)">
  <div class="modal" id="dmodal-inner"></div>
</div>

<!-- Three.js desde cdnjs -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// GLOBE 3D
// ============================================================
let scene, camera, renderer, globe, atmosfera, pinGroup;
let isDragging = false, prevMouse = {x:0,y:0};
let rotVel = {x:0, y:0};   // velocidad de rotación por inercia
let targetQuat = null;       // cuaternión destino para animación
let isAnimating = false;
let globeZoomed = false;
const GLOBE_R = 1.0;
const BASE_CAM_Z = 2.6;
const ZOOM_CAM_Z = 1.65;

function initGlobe() {
  const container = document.getElementById('globe-container');
  const W = container.clientWidth, H = container.clientHeight;

  // Scene
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 100);
  camera.position.z = BASE_CAM_Z;

  renderer = new THREE.WebGLRenderer({canvas: document.getElementById('globe-canvas'), antialias: true, alpha: true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W, H);
  renderer.setClearColor(0x000000, 0);

  // Estrellas
  const starGeo = new THREE.BufferGeometry();
  const starPts = [];
  for (let i = 0; i < 1800; i++) {
    const v = new THREE.Vector3().randomDirection().multiplyScalar(30 + Math.random()*20);
    starPts.push(v.x, v.y, v.z);
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPts, 3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff, size:0.08, transparent:true, opacity:0.6})));

  // Iluminación
  scene.add(new THREE.AmbientLight(0x334466, 0.8));
  const sun = new THREE.DirectionalLight(0xffffff, 1.1);
  sun.position.set(5, 3, 5);
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0x2244aa, 0.3);
  fill.position.set(-5, -2, -3);
  scene.add(fill);

  // Globo base (océano oscuro)
  const geo = new THREE.SphereGeometry(GLOBE_R, 64, 64);
  const oceanMat = new THREE.MeshPhongMaterial({color:0x0a1a3a, shininess:60, specular:0x223366});
  globe = new THREE.Mesh(geo, oceanMat);
  scene.add(globe);

  // Países dibujados sobre la esfera como líneas
  drawCountriesOnGlobe();

  // Atmósfera glow
  const atmGeo = new THREE.SphereGeometry(GLOBE_R * 1.04, 32, 32);
  const atmMat = new THREE.MeshPhongMaterial({
    color: 0x4488ff, transparent: true, opacity: 0.07,
    side: THREE.FrontSide, depthWrite: false
  });
  atmosfera = new THREE.Mesh(atmGeo, atmMat);
  scene.add(atmosfera);

  // Grupo de pines
  pinGroup = new THREE.Group();
  globe.add(pinGroup);

  // Posición inicial: centrada en Europa/Atlántico
  globe.rotation.y = -0.3;
  globe.rotation.x = 0.15;

  // Interacción
  setupGlobeInteraction();

  // Loop
  animate();
}

// ── Convertir lat/lng a XYZ en la esfera
function latLngToVec3(lat, lng, r) {
  const phi   = (90 - lat) * Math.PI / 180;
  const theta = (lng + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta)
  );
}

// ── Dibujar países como líneas sobre la esfera
function drawCountriesOnGlobe() {
  // Usamos los paths SVG pre-generados + proyección inversa Mercator → lat/lng → 3D
  // Pero más eficiente: dibujar graticule + continentes con canvas texture
  buildGlobeTexture();
}

function buildGlobeTexture() {
  // Crear textura del globo con canvas 2D
  const TW = 2048, TH = 1024;
  const cv = document.createElement('canvas');
  cv.width = TW; cv.height = TH;
  const ctx = cv.getContext('2d');

  // Océano
  const oceanGrad = ctx.createLinearGradient(0, 0, 0, TH);
  oceanGrad.addColorStop(0, '#0d1f40');
  oceanGrad.addColorStop(0.5, '#091628');
  oceanGrad.addColorStop(1, '#060e1a');
  ctx.fillStyle = oceanGrad;
  ctx.fillRect(0, 0, TW, TH);

  // Graticule
  ctx.strokeStyle = 'rgba(80,120,200,0.12)';
  ctx.lineWidth = 0.8;
  for (let lat = -80; lat <= 80; lat += 30) {
    const y = (90 - lat) / 180 * TH;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(TW, y); ctx.stroke();
  }
  for (let lng = -180; lng <= 180; lng += 30) {
    const x = (lng + 180) / 360 * TW;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, TH); ctx.stroke();
  }
  // Ecuador más visible
  ctx.strokeStyle = 'rgba(80,120,200,0.25)';
  ctx.lineWidth = 1.2;
  const eqY = TH / 2;
  ctx.beginPath(); ctx.moveTo(0, eqY); ctx.lineTo(TW, eqY); ctx.stroke();

  // Países desde SVG paths (proyección Mercator → equirectangular en canvas)
  // Parsear los SVG paths y dibujarlos re-proyectados
  drawCountriesOnCanvas(ctx, TW, TH);

  // Aplicar como textura al globo
  const texture = new THREE.CanvasTexture(cv);
  globe.material = new THREE.MeshPhongMaterial({
    map: texture,
    shininess: 35,
    specular: new THREE.Color(0x1a2244),
  });
}

function drawCountriesOnCanvas(ctx, TW, TH) {
  // Los SVG paths están en proyección Mercator con MAP_W=800, MAP_H=370
  // Necesitamos convertir a coordenadas equirectangulares (lat/lng lineales)
  const SVG_W = 800, SVG_H = 370;

  // Función inversa: SVG xy → lat/lng
  function svgToLatLng(sx, sy) {
    const lng = (sx / SVG_W) * 360 - 180;
    // Mercator Y: y = H/2 - (ln(tan(π/4 + φ/2))/π) * H*0.82
    const yNorm = (SVG_H/2 - sy) / (SVG_H * 0.82);
    const lat = (Math.atan(Math.sinh(yNorm * Math.PI)) * 180) / Math.PI;
    return [lat, lng];
  }

  // Convertir lat/lng → canvas equirectangular
  function latLngToCanvas(lat, lng) {
    const x = (lng + 180) / 360 * TW;
    const y = (90 - lat) / 180 * TH;
    return [x, y];
  }

  // Parsear el SVG path string y dibujar en canvas
  const pathStr = COUNTRY_SVG_PATHS;

  // Extraer cada path
  const pathRegex = /d="([^"]+)"/g;
  let match;
  ctx.fillStyle = 'rgba(22, 45, 80, 0.95)';
  ctx.strokeStyle = 'rgba(40, 80, 140, 0.7)';
  ctx.lineWidth = 0.5;

  while ((match = pathRegex.exec(pathStr)) !== null) {
    const d = match[1];
    const cmds = d.match(/[ML][^ML]*/g);
    if (!cmds) continue;
    ctx.beginPath();
    let firstPoint = true;
    for (const cmd of cmds) {
      if (cmd === 'Z' || cmd === 'z') { ctx.closePath(); continue; }
      const type = cmd[0];
      // Parsear pares de coordenadas
      const nums = cmd.slice(1).trim().split(/[, ]+/).map(Number);
      for (let i = 0; i < nums.length - 1; i += 2) {
        const [lat, lng] = svgToLatLng(nums[i], nums[i+1]);
        const [cx, cy] = latLngToCanvas(lat, lng);
        if (i === 0) {
          if (type === 'M') ctx.moveTo(cx, cy);
          else ctx.lineTo(cx, cy);
        } else {
          ctx.lineTo(cx, cy);
        }
      }
    }
    ctx.fill();
    ctx.stroke();
  }
}

// ── Pines 3D
function addPins(races) {
  pinGroup.clear();
  races.forEach((race, idx) => {
    if (!race.lat && !race.lng) return;
    const pos = latLngToVec3(race.lat, race.lng, GLOBE_R + 0.015);

    // Esfera del pin
    const r = race.status === 'current' ? 0.028 : 0.020;
    const color = race.status === 'done' ? 0x555555
                : race.status === 'current' ? 0xFFD700
                : 0xE10600;
    const pinGeo = new THREE.SphereGeometry(r, 8, 8);
    const pinMat = new THREE.MeshPhongMaterial({color, emissive: color, emissiveIntensity: race.status==='current' ? 0.6 : 0.2});
    const pin = new THREE.Mesh(pinGeo, pinMat);
    pin.position.copy(pos);
    pin.userData = {raceIdx: idx, race};

    // Halo para el pin actual
    if (race.status === 'current') {
      const haloGeo = new THREE.SphereGeometry(0.048, 8, 8);
      const haloMat = new THREE.MeshPhongMaterial({color:0xFFD700, transparent:true, opacity:0.25, emissive:0xFFD700, emissiveIntensity:0.3});
      const halo = new THREE.Mesh(haloGeo, haloMat);
      halo.position.copy(pos);
      halo.userData = {isHalo: true};
      pinGroup.add(halo);
    }

    pinGroup.add(pin);
  });
}

// ── Animación
let haloPhase = 0;
function animate() {
  requestAnimationFrame(animate);
  haloPhase += 0.04;

  // Inercia de rotación
  if (!isDragging && !isAnimating && (Math.abs(rotVel.x) > 0.0001 || Math.abs(rotVel.y) > 0.0001)) {
    globe.rotation.x += rotVel.x;
    globe.rotation.y += rotVel.y;
    rotVel.x *= 0.92;
    rotVel.y *= 0.92;
  }

  // Animación hacia destino
  if (isAnimating && targetQuat) {
    globe.quaternion.slerp(targetQuat, 0.06);
    if (globe.quaternion.angleTo(targetQuat) < 0.005) {
      globe.quaternion.copy(targetQuat);
      isAnimating = false;
    }
    // Zoom cámara
    const targetZ = globeZoomed ? ZOOM_CAM_Z : BASE_CAM_Z;
    camera.position.z += (targetZ - camera.position.z) * 0.06;
  }

  // Pulso del halo
  pinGroup.children.forEach(m => {
    if (m.userData.isHalo) {
      m.scale.setScalar(1 + 0.25 * Math.sin(haloPhase));
      m.material.opacity = 0.15 + 0.15 * Math.sin(haloPhase);
    }
  });

  // Atmósfera
  if (atmosfera) {
    atmosfera.quaternion.copy(globe.quaternion).invert();
  }

  renderer.render(scene, camera);
}

// ── Girar globo para centrar lat/lng
function rotateGlobeTo(lat, lng) {
  // Queremos que el punto (lat,lng) quede mirando hacia la cámara (eje +Z)
  // Calculamos la rotación necesaria
  const phi   = (90 - lat) * Math.PI / 180;
  const theta = (lng + 180) * Math.PI / 180;

  // Eje Y: rotación para centrar longitud
  const rotY = -theta + Math.PI;
  // Eje X: rotación para centrar latitud
  const rotX = phi - Math.PI / 2;

  const q = new THREE.Quaternion();
  const ex = new THREE.Euler(rotX, rotY, 0, 'YXZ');
  q.setFromEuler(ex);
  targetQuat = q;
  isAnimating = true;
  globeZoomed = true;
  document.getElementById('globe-reset').classList.add('vis');
}

function resetGlobe() {
  targetQuat = new THREE.Quaternion(); // identidad
  const ex = new THREE.Euler(0.15, -0.3, 0, 'YXZ');
  targetQuat.setFromEuler(ex);
  isAnimating = true;
  globeZoomed = false;
  document.getElementById('globe-reset').classList.remove('vis');
  closePopup();
}

// ── Raycasting para clicks en pines
const raycaster = new THREE.Raycaster();
const mouse2D = new THREE.Vector2();

function getCanvasPos(e, canvas) {
  const rect = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: ((clientX - rect.left) / rect.width) * 2 - 1,
    y: -((clientY - rect.top) / rect.height) * 2 + 1
  };
}

function checkPinClick(e) {
  const cv = renderer.domElement;
  const pos = getCanvasPos(e, cv);
  mouse2D.set(pos.x, pos.y);
  raycaster.setFromCamera(mouse2D, camera);
  const meshes = pinGroup.children.filter(m => !m.userData.isHalo);
  const hits = raycaster.intersectObjects(meshes);
  if (hits.length > 0) {
    const race = hits[0].object.userData.race;
    if (race) {
      showPopup(race);
      rotateGlobeTo(race.lat, race.lng);
      return true;
    }
  }
  return false;
}

function setupGlobeInteraction() {
  const cv = renderer.domElement;
  let startPos = null;
  let moved = false;

  cv.addEventListener('mousedown', e => {
    isDragging = true; moved = false;
    prevMouse = {x: e.clientX, y: e.clientY};
    startPos = {x: e.clientX, y: e.clientY};
    rotVel = {x:0, y:0};
    isAnimating = false;
  });
  cv.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dx = e.clientX - prevMouse.x;
    const dy = e.clientY - prevMouse.y;
    if (Math.abs(dx) + Math.abs(dy) > 2) moved = true;
    rotVel.y = dx * 0.004;
    rotVel.x = dy * 0.004;
    globe.rotation.y += rotVel.y;
    globe.rotation.x += rotVel.x;
    globe.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, globe.rotation.x));
    prevMouse = {x: e.clientX, y: e.clientY};
  });
  cv.addEventListener('mouseup', e => {
    isDragging = false;
    if (!moved) checkPinClick(e);
  });

  // Touch
  let touchStart = null;
  cv.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      isDragging = true; moved = false;
      prevMouse = {x: e.touches[0].clientX, y: e.touches[0].clientY};
      touchStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
      rotVel = {x:0, y:0}; isAnimating = false;
    }
  }, {passive:true});
  cv.addEventListener('touchmove', e => {
    if (!isDragging || e.touches.length !== 1) return;
    const dx = e.touches[0].clientX - prevMouse.x;
    const dy = e.touches[0].clientY - prevMouse.y;
    if (Math.abs(dx)+Math.abs(dy) > 3) moved = true;
    rotVel.y = dx * 0.005;
    rotVel.x = dy * 0.005;
    globe.rotation.y += rotVel.y;
    globe.rotation.x += rotVel.x;
    globe.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, globe.rotation.x));
    prevMouse = {x: e.touches[0].clientX, y: e.touches[0].clientY};
  }, {passive:true});
  cv.addEventListener('touchend', e => {
    isDragging = false;
    if (!moved && touchStart) {
      const fakeEv = {clientX: touchStart.x, clientY: touchStart.y};
      checkPinClick(fakeEv);
    }
  });
}

function getTeamColor(id){return TEAM_COLORS[id]||'#666';}

async function fetchJSON(url){
  const r=await fetch(url); if(!r.ok) throw new Error('HTTP '+r.status); return r.json();
}

async function loadAll(){
  try {
    const [schedData, drvData, conData, resData] = await Promise.all([
      fetchJSON(`${API}/${YEAR}/races.json?limit=30`),
      fetchJSON(`${API}/${YEAR}/driverStandings.json`),
      fetchJSON(`${API}/${YEAR}/constructorStandings.json`),
      fetchJSON(`${API}/${YEAR}/results.json?limit=500`),
    ]);

    driverStandings = drvData.MRData.StandingsTable.StandingsLists[0]?.DriverStandings || [];
    constructorStandings = conData.MRData.StandingsTable.StandingsLists[0]?.ConstructorStandings || [];

    const allResults = resData.MRData.RaceTable.Races;
    driverResults = {};
    allResults.forEach(race => {
      const rnd = parseInt(race.round);
      const ex = RACE_EXTRA[rnd] || {};
      race.Results.forEach(r => {
        const did = r.Driver.driverId;
        if (!driverResults[did]) driverResults[did] = [];
        const pos = (r.status==='Finished'||r.status.startsWith('+')) ? parseInt(r.position) : null;
        driverResults[did].push({round:rnd, raceName:race.raceName.replace('Grand Prix','GP'),
          raceFlag:ex.flag||'🏁', pos, status:r.status, pts:parseFloat(r.points)});
      });
    });

    const today = new Date();
    allRaces = schedData.MRData.RaceTable.Races.map(r => {
      const rnd = parseInt(r.round);
      const ex = RACE_EXTRA[rnd] || {};
      const cKey = CIRCUIT_KEYS[rnd-1] || '';
      const cInfo = CIRCUITS[cKey] || {};
      const hasResult = allResults.find(x=>x.round===r.round);
      let status = hasResult ? 'done' : 'upcoming';
      const raceDate = new Date(r.date+'T'+(r.time||'12:00:00'));
      if (!hasResult && raceDate <= new Date(today.getTime()+3*24*60*60*1000)) status='current';
      if (status==='done'||status==='current') currentRound=rnd;
      const top = hasResult ? hasResult.Results.slice(0,3) : null;
      return {round:rnd, raceName:r.raceName, circuit:r.Circuit.circuitName,
        city:r.Circuit.Location.locality, country:r.Circuit.Location.country,
        date:r.date, sprint:!!r.Sprint, status, flag:ex.flag||'🏁',
        lat:ex.lat||0, lng:ex.lng||0,
        p1:top?top[0]?.Driver.familyName:null,
        p2:top?top[1]?.Driver.familyName:null,
        p3:top?top[2]?.Driver.familyName:null,
        circuitInfo:cInfo};
    });

    const next = allRaces.find(r=>r.status==='upcoming'||r.status==='current');
    if (next) {
      const s=next.raceName.replace('Formula 1 ','').replace(' Grand Prix','').replace('Grand Prix','').trim();
      document.getElementById('header-round').textContent=`R${next.round} · ${s}`;
    }

    updateTicker();
    addPins(allRaces);
    renderRaces();
    renderDrivers();
    renderTeams();

  } catch(e) {
    console.error(e);
    ['panel-cal','panel-drv','panel-con'].forEach(id=>{
      document.getElementById(id).innerHTML='<div class="error-msg">⚠️ No se pudo cargar la API de F1.<br>Verificá tu conexión a internet.</div>';
    });
  }
}

function updateTicker(){
  const l=driverStandings[0], p2=driverStandings[1], p3=driverStandings[2];
  const next=allRaces.find(r=>r.status==='upcoming'||r.status==='current');
  let t='';
  if(l) t+=`🏆 ${l.Driver.familyName} LIDERA · ${l.points} PTS &nbsp;·&nbsp; `;
  if(p2) t+=`${p2.Driver.familyName} P2 (${p2.points} PTS) &nbsp;·&nbsp; `;
  if(p3) t+=`${p3.Driver.familyName} P3 (${p3.points} PTS) &nbsp;·&nbsp; `;
  if(next){const d=new Date(next.date);const mo=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];t+=`📅 PRÓXIMA: ${next.flag} ${next.raceName.replace('Formula 1 ','').replace(' Grand Prix','').trim()} · ${d.getDate()} ${mo[d.getMonth()]} &nbsp;·&nbsp; `;}
  const col=driverStandings.find(d=>d.Driver.driverId==='colapinto');
  if(col) t+=`🇦🇷 COLAPINTO P${col.position} · ${col.points} PTS &nbsp;·&nbsp; `;
  t+='NUEVA ERA: HÍBRIDOS 50/50 &nbsp;·&nbsp;';
  document.getElementById('ticker-text').innerHTML=t;
}

function renderDrivers(){
  const c=document.getElementById('panel-drv');
  c.innerHTML=`<div class="stitle">Pilotos · R${currentRound}</div><div class="api-badge">Jolpica F1 API · En vivo</div>`;
  const max=parseFloat(driverStandings[0]?.points||1);
  driverStandings.forEach(s=>{
    const d=s.Driver, con=s.Constructors[0];
    const color=getTeamColor(con?.constructorId||'');
    const flag=getFlag(d.nationality);
    const pts=parseFloat(s.points), pct=Math.round(pts/max*100);
    const pos=parseInt(s.position), pc=pos===1?'p1':pos===2?'p2':pos===3?'p3':'';
    const div=document.createElement('div');
    div.className='drow'; div.style.borderLeftColor=color;
    div.innerHTML=`<div class="pos ${pc}">${pos}</div><div style="font-size:16px">${flag}</div><div style="flex:1"><div class="dname">${d.givenName.split(' ')[0]} ${d.familyName}${d.nationality==='Argentine'?' ⭐':''}</div><div class="dteam" style="color:${color}">${con?.name||''}</div></div><div style="text-align:right"><div class="dpts" style="color:${pos<=3?'var(--gold)':'var(--text)'}">${pts}</div><div class="ptslbl">PTS</div><div class="ptsbar"><div class="ptsbarfill" style="width:${pct}%;background:${color}"></div></div></div>`;
    div.addEventListener('click',()=>openDriver(s,color,flag));
    c.appendChild(div);
  });
}

function openDriver(s,color,flag){
  const d=s.Driver, con=s.Constructors[0];
  const results=driverResults[d.driverId]||[];
  const wins=results.filter(r=>r.pos===1).length;
  const podiums=results.filter(r=>r.pos!==null&&r.pos<=3).length;
  let histHTML='';
  if(!results.length){histHTML='<div style="color:var(--muted);font-size:12px;padding:8px">Sin carreras disputadas.</div>';}
  else{results.sort((a,b)=>a.round-b.round).forEach(r=>{
    let posStr,posColor;
    if(r.pos===null){posStr=r.status||'DNF';posColor='var(--muted)';}
    else if(r.pos===1){posStr='P1 🏆';posColor='var(--gold)';}
    else if(r.pos===2){posStr='P2';posColor='var(--silver)';}
    else if(r.pos===3){posStr='P3';posColor='var(--bronze)';}
    else{posStr='P'+r.pos;posColor='var(--text)';}
    histHTML+=`<div class="race-hist"><div class="rh-round">R${r.round}</div><div style="font-size:15px">${r.raceFlag}</div><div class="rh-name">${r.raceName}</div><div class="rh-pos" style="color:${posColor}">${posStr}</div><div class="rh-pts">${r.pts>0?'+'+r.pts+' pts':'—'}</div></div>`;
  });}
  document.getElementById('dmodal-inner').innerHTML=`
    <div class="modal-header"><div class="modal-flag">${flag}</div><div style="flex:1">
    <div class="modal-dname" style="color:${color}">${d.givenName} ${d.familyName}</div>
    <div class="modal-team" style="color:${color}">${con?.name||''} · #${d.permanentNumber||'?'} · ${d.nationality}</div>
    </div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-stats">
      <div class="mstat"><div class="mstat-val" style="color:var(--gold)">${s.points}</div><div class="mstat-lbl">Puntos</div></div>
      <div class="mstat"><div class="mstat-val" style="color:var(--red)">${wins}</div><div class="mstat-lbl">Victorias</div></div>
      <div class="mstat"><div class="mstat-val">${podiums}</div><div class="mstat-lbl">Podios</div></div>
    </div>
    <div class="season-title">Historial ${YEAR} · R1–R${currentRound}</div>${histHTML}`;
  document.getElementById('dmodal').classList.add('show');
}
function closeModal(e){if(!e||e.target===document.getElementById('dmodal'))document.getElementById('dmodal').classList.remove('show');}

function renderTeams(){
  const c=document.getElementById('panel-con');
  c.innerHTML=`<div class="stitle">Constructores · R${currentRound}</div><div class="api-badge">Jolpica F1 API · En vivo</div>`;
  const max=parseFloat(constructorStandings[0]?.points||1);
  constructorStandings.forEach(s=>{
    const con=s.Constructor, color=getTeamColor(con.constructorId);
    const pts=parseFloat(s.points), pct=Math.round(pts/max*100);
    const pos=parseInt(s.position), pc=pos===1?'p1':pos===2?'p2':pos===3?'p3':'';
    const chips=driverStandings.filter(ds=>ds.Constructors[0]?.constructorId===con.constructorId)
      .map(ds=>`<div class="driver-chip"><div class="dc-flag">${getFlag(ds.Driver.nationality)}</div><div class="dc-name">${ds.Driver.familyName}</div><div class="dc-pts">${ds.points} pts</div></div>`).join('');
    const div=document.createElement('div');
    div.className='team-card'; div.style.borderLeftColor=color;
    div.innerHTML=`<div class="team-header"><div class="team-pos ${pc}">${pos}</div><div class="team-dot" style="background:${color}"></div><div style="flex:1"><div class="team-name">${con.name}</div></div><div style="text-align:right"><div class="team-pts-big" style="color:${pos<=3?'var(--gold)':'var(--text)'}">${pts}</div><div class="team-pts-lbl">PTS</div></div></div><div class="ptsbar2"><div class="ptsbar2fill" style="width:${pct}%;background:${color}"></div></div><div class="team-drivers-row">${chips}</div>`;
    c.appendChild(div);
  });
}

function renderCircuits(){
  const c=document.getElementById('panel-cir');
  c.innerHTML='<div class="stitle">Circuitos</div>';
  const sel=document.createElement('select'); sel.className='csel';
  sel.innerHTML='<option value="">— Seleccionar circuito —</option>';
  Object.entries(CIRCUITS).forEach(([k,v])=>{const o=document.createElement('option');o.value=k;o.textContent=v.name;sel.appendChild(o);});
  const detail=document.createElement('div');
  sel.addEventListener('change',()=>{
    const ci=CIRCUITS[sel.value]; if(!ci){detail.innerHTML='';return;}
    detail.innerHTML=`<div class="cdetail"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><div style="font-size:28px">${ci.flag}</div><div><div style="font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:900;text-transform:uppercase">${ci.name}</div><div style="font-size:12px;color:var(--muted)">${ci.city}</div></div></div><div class="sgrid"><div class="sbox"><div class="slabel">Vueltas</div><div class="sval">${ci.laps}</div></div><div class="sbox"><div class="slabel">Longitud</div><div class="sval" style="font-size:13px">${ci.len}</div></div><div class="sbox"><div class="slabel">Curvas</div><div class="sval">${ci.curvas}</div></div><div class="sbox"><div class="slabel">Tipo</div><div class="sval" style="font-size:12px">${ci.tipo}</div></div></div><div class="sbox" style="margin-top:8px"><div class="slabel">Vuelta récord</div><div class="sval" style="font-size:12px">${ci.record}</div></div><div style="margin-top:8px;padding:8px 10px;background:var(--surface2);border-radius:6px;font-size:11px;color:var(--muted)">💡 ${ci.nota}</div></div>`;
  });
  c.appendChild(sel); c.appendChild(detail);
}
