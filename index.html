<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>F1 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--red:#E10600;--rd:#9B0400;--bg:#0A0A0A;--sf:#141414;--sf2:#1E1E1E;--br:#2A2A2A;--tx:#F0F0F0;--mu:#888;--gold:#FFD700;--si:#C0C0C0;--bz:#CD7F32;}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Barlow',sans-serif;overflow:hidden}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;background:var(--bg);border-bottom:1px solid var(--br)}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;letter-spacing:2px;color:var(--red);text-transform:uppercase}
.logo span{color:var(--tx)}
.rbadge{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--mu);text-transform:uppercase;display:flex;align-items:center;gap:5px}
.ldot{width:7px;height:7px;border-radius:50%;background:var(--red);animation:ldot 1.2s ease-in-out infinite;flex-shrink:0}
@keyframes ldot{0%,100%{opacity:1}50%{opacity:0.3}}
.ticker{background:var(--red);padding:5px 0;overflow:hidden;white-space:nowrap}
.tk{display:inline-block;animation:tk 32s linear infinite;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;color:#fff;text-transform:uppercase}
@keyframes tk{0%{transform:translateX(100vw)}100%{transform:translateX(-100%)}}
.app{display:flex;flex-direction:column;height:calc(100vh - 90px)}
.globe-wrap{position:relative;flex:0 0 255px;overflow:hidden;background:#000}
#gc{width:100%;height:100%;display:block;cursor:grab}
#gc:active{cursor:grabbing}
#greset{position:absolute;top:8px;right:8px;z-index:10;background:rgba(8,8,8,0.92);border:1px solid var(--br);color:var(--mu);font-size:11px;padding:4px 10px;border-radius:4px;cursor:pointer;display:none;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;-webkit-tap-highlight-color:transparent}
#greset.vis{display:block}
.cpopup{position:absolute;bottom:8px;left:8px;right:8px;background:rgba(14,14,14,0.97);border:1px solid var(--br);border-radius:8px;padding:10px 12px;display:none;z-index:10;align-items:center;gap:10px}
.cpopup.show{display:flex}
.pflag{font-size:20px}.pname{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:1px}
.pmeta{font-size:11px;color:var(--mu);margin-top:2px}.pclose{font-size:16px;color:var(--mu);cursor:pointer;padding:2px 6px;background:none;border:none}
.pst{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:3px;text-transform:uppercase}
.st-d{background:var(--br);color:var(--mu)}.st-c{background:var(--gold);color:#000}.st-u{background:var(--sf2);color:var(--mu)}
.tabs{display:flex;background:var(--sf);border-bottom:1px solid var(--br)}
.tb{flex:1;padding:10px 4px;border:none;background:none;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;color:var(--mu);cursor:pointer;text-transform:uppercase;border-bottom:2px solid transparent;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.tb.active{color:var(--red);border-bottom-color:var(--red)}
.panels{flex:1;overflow:hidden;position:relative}
.panel{position:absolute;inset:0;overflow-y:auto;padding:12px;display:none;-webkit-overflow-scrolling:touch}
.panel.active{display:block}
.panel::-webkit-scrollbar{width:3px}.panel::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
.stitle{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--mu);margin-bottom:10px;margin-top:4px;display:flex;align-items:center;gap:8px}
.stitle::after{content:'';flex:1;height:1px;background:var(--br)}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:120px;gap:10px;color:var(--mu);font-size:13px}
.sp{width:24px;height:24px;border:2px solid var(--br);border-top-color:var(--red);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.err{background:rgba(225,6,0,0.1);border:1px solid var(--rd);border-radius:6px;padding:10px;font-size:12px;color:#ff6b6b;text-align:center;margin:8px 0}
.rc{display:flex;gap:10px;align-items:flex-start;padding:10px;border-radius:6px;background:var(--sf);margin-bottom:6px;border-left:3px solid var(--br);cursor:pointer}
.rc.done{opacity:.65}.rc.current{border-left-color:var(--gold);background:rgba(255,215,0,.04)}
.rc.current .rn{color:var(--gold)}
.rd2{min-width:36px;text-align:center;font-family:'Barlow Condensed',sans-serif}
.rdy{font-size:22px;font-weight:900;line-height:1}.rmn{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--mu);text-transform:uppercase}
.ri{flex:1}.rr{font-size:10px;font-weight:600;color:var(--mu);letter-spacing:1px;text-transform:uppercase}
.rn{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;margin:1px 0}
.rci{font-size:11px;color:var(--mu)}.rfl{font-size:18px}
.sbadge{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;background:rgba(225,6,0,.15);color:var(--red);border:1px solid var(--rd);border-radius:3px;padding:1px 5px;text-transform:uppercase;margin-left:6px}
.rres{font-size:11px;margin-top:3px}.win{color:var(--gold);font-weight:600}
.drow{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:6px;margin-bottom:4px;background:var(--sf);border-left:3px solid transparent;cursor:pointer;-webkit-tap-highlight-color:transparent}
.drow:active{background:var(--sf2)}
.pos{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:var(--mu);min-width:22px;text-align:center}
.pos.p1{color:var(--gold)}.pos.p2{color:var(--si)}.pos.p3{color:var(--bz)}
.dn{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.dt{font-size:11px;color:var(--mu);margin-top:1px}
.dpts{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:900}
.ptsl{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:600;color:var(--mu);letter-spacing:1px;text-align:right;margin-top:1px}
.pb{height:3px;border-radius:2px;margin-top:4px;background:var(--br);width:60px}
.pbf{height:100%;border-radius:2px}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:none;align-items:flex-end}
.mbg.show{display:flex}
.modal{background:var(--sf);border-radius:16px 16px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.mh{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.mfl{font-size:38px}.mdn{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:1px}
.mtm{font-size:12px;margin-top:2px}
.mcl{margin-left:auto;font-size:20px;color:var(--mu);background:none;border:none;cursor:pointer;padding:4px 8px;-webkit-tap-highlight-color:transparent}
.ms{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.msb{background:var(--sf2);border-radius:8px;padding:10px;text-align:center}
.msv{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900}
.msl{font-size:10px;color:var(--mu);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.ht{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--mu);text-transform:uppercase;margin-bottom:8px}
.rh{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--sf2);border-radius:6px;margin-bottom:4px}
.rhr{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--mu);min-width:28px}
.rhn{flex:1;font-size:12px}.rhp{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;min-width:32px;text-align:right}
.rhpts{font-size:10px;color:var(--mu);min-width:36px;text-align:right}
.tc{background:var(--sf);border-radius:8px;margin-bottom:8px;overflow:hidden;border-left:3px solid transparent}
.th{display:flex;align-items:center;gap:10px;padding:12px 12px 8px}
.tp{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:var(--mu);min-width:26px}
.tp.p1{color:var(--gold)}.tp.p2{color:var(--si)}.tp.p3{color:var(--bz)}
.tdot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.tn{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;text-transform:uppercase;flex:1}
.tpb{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900}
.tpl{font-size:9px;color:var(--mu);letter-spacing:1px;text-transform:uppercase}
.pb2{height:3px;background:var(--br);margin:0 12px 10px}.pb2f{height:100%;border-radius:2px}
.tdr{display:flex;gap:6px;padding:0 12px 12px}
.dch{flex:1;background:var(--sf2);border-radius:6px;padding:8px 10px}
.dcf{font-size:15px}.dcn{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;margin-top:2px;line-height:1.2}
.dcp{font-size:11px;color:var(--mu);margin-top:2px}
.csel{width:100%;background:var(--sf);border:1px solid var(--br);color:var(--tx);padding:10px;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;appearance:none;margin-bottom:12px}
.cd{background:var(--sf);border-radius:8px;padding:14px;margin-bottom:8px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sb2{background:var(--sf2);border-radius:6px;padding:8px 10px}
.sl{font-size:10px;color:var(--mu);letter-spacing:1px;text-transform:uppercase}
.sv{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;margin-top:2px}
.apib{font-size:10px;color:var(--mu);text-align:right;margin-bottom:6px;font-style:italic}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">F1 <span>2026</span></div>
  <div class="rbadge"><span class="ldot"></span><span id="hround">Cargando...</span></div>
</div>
<div class="ticker"><span class="tk" id="tktxt">⏳ Cargando...</span></div>
<div class="app">
  <div class="globe-wrap">
    <canvas id="gc"></canvas>
    <button id="greset" onclick="resetGlobe()">✕ RESET</button>
    <div class="cpopup" id="cpopup">
      <div class="pflag" id="pflag">🏁</div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:6px">
          <div class="pname" id="pname"></div><div class="pst" id="pst"></div>
        </div>
        <div class="pmeta" id="pmeta"></div>
      </div>
      <button class="pclose" onclick="closePopup()">✕</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tb active" onclick="switchTab(this,'cal')">📅 Cal</button>
    <button class="tb" onclick="switchTab(this,'drv')">🏆 Drivers</button>
    <button class="tb" onclick="switchTab(this,'con')">🔧 Teams</button>
    <button class="tb" onclick="switchTab(this,'cir')">🏎 Circuits</button>
  </div>
  <div class="panels">
    <div class="panel active" id="panel-cal"><div class="loading"><div class="sp"></div>Cargando...</div></div>
    <div class="panel" id="panel-drv"><div class="loading"><div class="sp"></div>Cargando...</div></div>
    <div class="panel" id="panel-con"><div class="loading"><div class="sp"></div>Cargando...</div></div>
    <div class="panel" id="panel-cir"></div>
  </div>
</div>
<div class="mbg" id="dmodal" onclick="closeModal(event)"><div class="modal" id="dmi"></div></div>

let velX = 0,    velY = 0.007;

function resize() {
  const wrap = cv.parentElement;
  W = wrap.clientWidth; H = wrap.clientHeight;
  cv.width = W * devicePixelRatio; cv.height = H * devicePixelRatio;
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
  cx.scale(devicePixelRatio, devicePixelRatio);
  R = Math.min(W, H) * 0.44;
}
resize();
window.addEventListener('resize', resize);

// Proyección ortográfica con rotación
function project(lat, lng) {
  const phi = lat * Math.PI / 180;
  const lam = lng * Math.PI / 180;
  let x =  Math.cos(phi) * Math.sin(lam);
  let y = -Math.sin(phi);
  let z =  Math.cos(phi) * Math.cos(lam);
  // Rotar Y
  const cY = Math.cos(rotY), sY = Math.sin(rotY);
  const x1 = x*cY + z*sY;
  const z1 = -x*sY + z*cY;
  // Rotar X
  const cX = Math.cos(rotX), sX = Math.sin(rotX);
  const y2 = y*cX - z1*sX;
  const z2 = y*sX + z1*cX;
  return { sx: W/2 + x1*R*zoom, sy: H/2 + y2*R*zoom, z: z2 };
}

// Calcular centroide de una polyline para encontrar el país cercano al click
function polyCentroid(poly) {
  let lat = 0, lng = 0;
  for (const p of poly) { lat += p[0]; lng += p[1]; }
  return [lat/poly.length, lng/poly.length];
}

// Encontrar país más cercano a un lat/lng clickeado
function findNearestCountry(clat, clng) {
  // Buscar la polyline cuyo centroide esté más cerca
  let best = 999, bestIdx = -1;
  LAND.forEach((poly, i) => {
    const [clat2, clng2] = polyCentroid(poly);
    const d = Math.hypot(clat2-clat, clng2-clng);
    if (d < best) { best = d; bestIdx = i; }
  });
  return bestIdx;
}

// Mapa de país para highlight: lat/lng → nombre de país aproximado
// Usamos el centroide del pin de carrera para encontrar polys cercanas
function highlightNear(lat, lng, radius) {
  // Marcar todas las polys cuyo centroide esté dentro del radio
  const marked = new Set();
  LAND.forEach((poly, i) => {
    const [clat2, clng2] = polyCentroid(poly);
    const d = Math.hypot(clat2-lat, clng2-lng);
    if (d < radius) marked.add(i);
  });
  return marked;
}

  cx.beginPath(); cx.arc(W/2, H/2, R*zoom, 0, Math.PI*2);
  const og = cx.createRadialGradient(W/2-R*zoom*0.28, H/2-R*zoom*0.22, R*zoom*0.02, W/2, H/2, R*zoom);
  og.addColorStop(0, '#1c3d70'); og.addColorStop(0.5, '#0c1e42'); og.addColorStop(1, '#030a18');
  cx.fillStyle = og; cx.fill();
  cx.restore();

  // Clip al globo
  cx.save();
  cx.beginPath(); cx.arc(W/2, H/2, R*zoom - 0.5, 0, Math.PI*2);
  cx.clip();

  // Graticule
  cx.strokeStyle = 'rgba(70,120,255,0.09)'; cx.lineWidth = 0.6;
  for (let lat = -60; lat <= 80; lat += 30) {
    cx.beginPath(); let f = true;
    for (let lng = -180; lng <= 180; lng += 4) {
      const p = project(lat, lng); if (p.z < 0) { f=true; continue; }
      f ? cx.moveTo(p.sx, p.sy) : cx.lineTo(p.sx, p.sy); f = false;
    }
    cx.stroke();
  }
  for (let lng = -180; lng <= 180; lng += 30) {
    cx.beginPath(); let f = true;
    for (let lat = -85; lat <= 85; lat += 4) {
      const p = project(lat, lng); if (p.z < 0) { f=true; continue; }
      f ? cx.moveTo(p.sx, p.sy) : cx.lineTo(p.sx, p.sy); f = false;
    }
    cx.stroke();
  }
  // Ecuador
  cx.strokeStyle = 'rgba(70,120,255,0.2)'; cx.lineWidth = 1;
  cx.beginPath(); let ef = true;
  for (let lng = -180; lng <= 180; lng += 2) {
    const p = project(0, lng); if (p.z < 0) { ef=true; continue; }
    ef ? cx.moveTo(p.sx, p.sy) : cx.lineTo(p.sx, p.sy); ef = false;
  }
  cx.stroke();

  // Países
  LAND.forEach((poly, idx) => {
    // Check visibilidad por centroide
    let sumZ = 0, n = 0;
    for (let i = 0; i < poly.length; i += Math.max(1, Math.floor(poly.length/6))) {
      sumZ += project(poly[i][0], poly[i][1]).z; n++;
    }
    if (sumZ/n < -0.25) return;

    cx.beginPath();
    let started = false, prevOk = false;
    for (let i = 0; i < poly.length; i++) {
      const p = project(poly[i][0], poly[i][1]);
      if (p.z < -0.04) { prevOk = false; continue; }
      if (!started || !prevOk) { cx.moveTo(p.sx, p.sy); started = true; }
      else cx.lineTo(p.sx, p.sy);
      prevOk = true;
    }
    cx.closePath();

    const avgZ = sumZ/n;
    const light = Math.max(0.25, Math.min(1, avgZ*0.65 + 0.5));
    const isHL = highlightedPolys.has(idx);

    if (isHL) {
      // País destacado: verde brillante
      cx.fillStyle = `rgba(40,180,60,${0.75+0.2*light})`;
      cx.fill();
      cx.strokeStyle = `rgba(80,240,80,0.8)`;
      cx.lineWidth = 1;
    } else {
      const r2 = Math.round(18*light), g2 = Math.round(45*light), b2 = Math.round(100*light);
      cx.fillStyle = `rgb(${r2},${g2},${b2})`;
      cx.fill();
      cx.strokeStyle = `rgba(40,90,200,${0.25*light})`;
      cx.lineWidth = 0.5;
    }
    cx.stroke();
  });

  cx.restore(); // quitar clip

  // Atmósfera
  const atm = cx.createRadialGradient(W/2, H/2, R*zoom*0.85, W/2, H/2, R*zoom*1.06);
  atm.addColorStop(0, 'rgba(40,110,255,0)');
  atm.addColorStop(0.6, 'rgba(50,120,255,0.05)');
  atm.addColorStop(1, 'rgba(70,150,255,0.20)');
  cx.beginPath(); cx.arc(W/2, H/2, R*zoom*1.06, 0, Math.PI*2);
  cx.fillStyle = atm; cx.fill();

  // Brillo solar
  const sh = cx.createRadialGradient(W/2-R*zoom*0.28, H/2-R*zoom*0.22, 0, W/2-R*zoom*0.1, H/2-R*zoom*0.05, R*zoom*0.55);
  sh.addColorStop(0, 'rgba(160,200,255,0.12)'); sh.addColorStop(1, 'rgba(0,0,0,0)');
  cx.save(); cx.beginPath(); cx.arc(W/2, H/2, R*zoom, 0, Math.PI*2);
  cx.clip(); cx.fillStyle = sh; cx.fillRect(0,0,W,H); cx.restore();

  // Pines
  races.forEach(race => {
    if (!race.lat && !race.lng) return;
    const p = project(race.lat, race.lng);
    if (p.z < 0.06) return;
    const x = p.sx, y = p.sy;
    const ps = race.status === 'current' ? 7 + 2*Math.sin(pulse) : 5;
    if (race.status === 'done') {
      cx.beginPath(); cx.arc(x, y, 4, 0, Math.PI*2);
      cx.fillStyle = '#444'; cx.fill();
      cx.strokeStyle = '#777'; cx.lineWidth = 1; cx.stroke();
    } else if (race.status === 'current') {
      const hr = ps*2.5;
      const hg = cx.createRadialGradient(x, y, 0, x, y, hr);
      hg.addColorStop(0, 'rgba(255,215,0,0.4)'); hg.addColorStop(1, 'rgba(255,215,0,0)');
      cx.beginPath(); cx.arc(x, y, hr, 0, Math.PI*2); cx.fillStyle = hg; cx.fill();
      cx.beginPath(); cx.arc(x, y, ps, 0, Math.PI*2);
      cx.fillStyle = '#FFD700'; cx.fill(); cx.strokeStyle = '#fff'; cx.lineWidth = 1.5; cx.stroke();
    } else {
      cx.beginPath(); cx.arc(x, y, 4.5, 0, Math.PI*2);
      cx.fillStyle = '#E10600'; cx.fill(); cx.strokeStyle = '#fff'; cx.lineWidth = 1.2; cx.stroke();
    }
  });
}

// Loop
function loop() {
  requestAnimationFrame(loop);
  pulse += 0.04;
  if (animTgt) {
    // Interpolación con normalización de ángulo
    const dX = animTgt.rx - rotX;
    let dY = animTgt.ry - rotY;
    // Camino más corto en Y
    while (dY >  Math.PI) dY -= Math.PI*2;
    while (dY < -Math.PI) dY += Math.PI*2;
    rotX += dX * 0.07;
    rotY += dY * 0.07;
    zoom += (tgtZoom - zoom) * 0.07;
    if (Math.abs(dX) < 0.002 && Math.abs(dY) < 0.002) {
      rotX = animTgt.rx; rotY = animTgt.ry; animTgt = null;
    }
  } else if (!drag) {
    rotY += velY; rotX += velX;
    rotX = Math.max(-1.3, Math.min(1.3, rotX));
    velX *= 0.88; velY *= 0.88;
    if (Math.abs(velY) < 0.0015) velY = 0.007;
    zoom += (tgtZoom - zoom) * 0.07;
  }
  drawFrame();
}
loop();

// ── Interacción ──────────────────────────────────
let tSX = 0, tSY = 0, tMoved = false;
cv.addEventListener('mousedown', e => {
  drag=true; px=e.clientX; py=e.clientY; velX=0; velY=0; animTgt=null;
});
document.addEventListener('mousemove', e => {
  if (!drag) return;
  const dx=e.clientX-px, dy=e.clientY-py;
  velY=dx*0.006; velX=dy*0.004;
  rotY+=velY; rotX+=velX;
  rotX=Math.max(-1.3,Math.min(1.3,rotX));
  px=e.clientX; py=e.clientY;
});
document.addEventListener('mouseup', e => {
  if (!drag) return; drag=false; checkClick(e.clientX, e.clientY);
});
cv.addEventListener('touchstart', e => {
  if (e.touches.length!==1) return;
  drag=true; tMoved=false;
  px=tSX=e.touches[0].clientX; py=tSY=e.touches[0].clientY;
  velX=0; velY=0; animTgt=null;
},{passive:true});
cv.addEventListener('touchmove', e => {
  if (!drag||e.touches.length!==1) return;
  e.preventDefault();
  const dx=e.touches[0].clientX-px, dy=e.touches[0].clientY-py;
  if (Math.abs(dx)+Math.abs(dy)>5) tMoved=true;
  velY=dx*0.007; velX=dy*0.005;
  rotY+=velY; rotX+=velX;
  rotX=Math.max(-1.3,Math.min(1.3,rotX));
  px=e.touches[0].clientX; py=e.touches[0].clientY;
},{passive:false});
cv.addEventListener('touchend', () => { drag=false; if(!tMoved) checkClick(tSX, tSY); });

function checkClick(mx, my) {
  const rect = cv.getBoundingClientRect();
  const sx = mx-rect.left, sy = my-rect.top;
  // Buscar pin más cercano
  let best=35, bestR=null;
  races.forEach(race => {
    if (!race.lat&&!race.lng) return;
    const p = project(race.lat, race.lng);
    if (p.z < 0.05) return;
    const d = Math.hypot(p.sx-sx, p.sy-sy);
    if (d < best) { best=d; bestR=race; }
  });
  if (bestR) { showPopup(bestR); globeGoTo(bestR.lat, bestR.lng); }
}

// ── Rotación hacia destino ─────────────────────────
function globeGoTo(lat, lng) {
  // Convertir lat/lng del destino a los ángulos de rotación
  // del globo que lo pondrían al frente (z+ positivo)
  const targetRotY = -lng * Math.PI / 180;
  const targetRotX = -lat * Math.PI / 180;

  // Normalizar el rotY actual para tomar el camino más corto
  let currentY = rotY % (Math.PI * 2);
  if (currentY < -Math.PI) currentY += Math.PI * 2;
  if (currentY >  Math.PI) currentY -= Math.PI * 2;

  let diffY = targetRotY - currentY;
  while (diffY >  Math.PI) diffY -= Math.PI * 2;
  while (diffY < -Math.PI) diffY += Math.PI * 2;

  animTgt = { rx: targetRotX, ry: currentY + diffY };
  tgtZoom = 1.55;
  document.getElementById('greset').classList.add('vis');

  // Highlight polys cercanas al lat/lng
  highlightedPolys = highlightNear(lat, lng, 15);
}

function resetGlobe() {
  animTgt = { rx: 0.35, ry: 0.5 };
  tgtZoom = 1.25; velY = 0.007;
  highlightedPolys = new Set();
  document.getElementById('greset').classList.remove('vis');
  closePopup();
}

let allRaces=[];
const gc2=id=>TC[id]||'#666', gf=nat=>NF[nat]||'🏁';

// Construir calendario estático con resultados reales
function buildStaticCalendar(apiRaces) {
  const today = new Date();
  return apiRaces.map(r => {
    const rnd = parseInt(r.round);
    const ex = RE[rnd] || {};
    const cKey = CK[rnd-1] || '';
    const cInfo = CI[cKey] || {};
    const realResult = REAL_RESULTS[rnd];
    const rDate = new Date(r.date + 'T' + (r.time || '12:00:00'));
    let status = realResult ? 'done' : (rDate <= new Date(today.getTime()+3*24*60*60*1000) ? 'current' : 'upcoming');
    return {
      round: rnd, raceName: r.raceName, circuit: r.Circuit.circuitName,
      city: r.Circuit.Location.locality, date: r.date, sprint: !!r.Sprint,
      status, flag: ex.flag||'🏁', lat: ex.lat||0, lng: ex.lng||0,
      p1: realResult?.p1||null, p2: realResult?.p2||null, p3: realResult?.p3||null,
      cInfo
    };
  });
}

async function loadAll() {
  try {
    // Solo necesitamos el calendario de la API (las fechas/circuitos)
    const sd = await fetch(`https://api.jolpi.ca/ergast/f1/2026/races.json?limit=30`).then(r=>r.json());
    allRaces = buildStaticCalendar(sd.MRData.RaceTable.Races);
    races = allRaces;
    const next = allRaces.find(r => r.status === 'upcoming');
    if (next) {
      const s = next.raceName.replace('Formula 1 ','').replace(' Grand Prix','').trim();
      document.getElementById('hround').textContent = `R${next.round} · ${s}`;
    }
    updateTicker();
    renderRaces();
    renderDrivers();
    renderTeams();
  } catch(e) {
    console.error(e);
    // Fallback: construir con fechas hardcodeadas mínimas
    buildFallback();
  }
}

function buildFallback() {
  // Calendario mínimo hardcodeado si la API falla
  const SCHED = [
    {round:1,name:'Australia',date:'2026-03-08'},{round:2,name:'China',date:'2026-03-15'},
    {round:3,name:'Japón',date:'2026-03-29'},{round:4,name:'Bahrain',date:'2026-04-12'},
    {round:5,name:'Arabia Saudita',date:'2026-04-19'},{round:6,name:'Mónaco',date:'2026-06-07'},
    {round:7,name:'España',date:'2026-06-14'},{round:8,name:'Austria',date:'2026-06-28'},
    {round:9,name:'Gran Bretaña',date:'2026-07-05'},{round:10,name:'Bélgica',date:'2026-07-19'},
    {round:11,name:'Hungría',date:'2026-07-26'},{round:12,name:'Países Bajos',date:'2026-08-23'},
    {round:13,name:'Italia',date:'2026-09-06'},{round:14,name:'Madrid',date:'2026-09-13'},
    {round:15,name:'Azerbaiyán',date:'2026-09-27'},{round:16,name:'Singapur',date:'2026-10-11'},
    {round:17,name:'EE.UU.',date:'2026-10-25'},{round:18,name:'México',date:'2026-11-01'},
    {round:19,name:'Brasil',date:'2026-11-08'},{round:20,name:'Las Vegas',date:'2026-11-21'},
    {round:21,name:'Qatar',date:'2026-11-29'},{round:22,name:'Abu Dhabi',date:'2026-12-06'},
  ];
  const today = new Date();
  allRaces = SCHED.map(s => {
    const ex = RE[s.round]||{}, cKey=CK[s.round-1]||'', cInfo=CI[cKey]||{};
    const rr = REAL_RESULTS[s.round];
    const rDate = new Date(s.date);
    const status = rr ? 'done' : (rDate<=new Date(today.getTime()+3*24*60*60*1000)?'current':'upcoming');
    return {round:s.round,raceName:s.name+' GP',circuit:cInfo.name||s.name,
      city:'',date:s.date,sprint:false,status,flag:ex.flag||'🏁',
      lat:ex.lat||0,lng:ex.lng||0,p1:rr?.p1||null,p2:rr?.p2||null,p3:rr?.p3||null,cInfo};
  });
  races = allRaces;
  document.getElementById('hround').textContent = 'R8 · Austria';
  updateTicker();
  renderRaces();
  renderDrivers();
  renderTeams();
}

function updateTicker() {
  const l=KNOWN_STANDINGS[0], p2=KNOWN_STANDINGS[1], p3=KNOWN_STANDINGS[2];
  const next=allRaces.find(r=>r.status==='upcoming');
  let t=`🏆 ${l.family} LIDERA · ${l.pts} PTS &nbsp;·&nbsp; ${p2.family} P2 (${p2.pts}) &nbsp;·&nbsp; ${p3.family} P3 (${p3.pts}) &nbsp;·&nbsp; `;
  t+=`🏁 BARCELONA R7: HAMILTON · RUSSELL · NORRIS &nbsp;·&nbsp; `;
  const col=KNOWN_STANDINGS.find(d=>d.id==='colapinto');
  if(col){const pos=KNOWN_STANDINGS.indexOf(col)+1;t+=`🇦🇷 COLAPINTO P${pos} · ${col.pts} PTS &nbsp;·&nbsp; `;}
  if(next){const d=new Date(next.date);const mo=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    t+=`📅 ${next.flag} ${next.raceName.replace('Formula 1 ','').replace(' Grand Prix','').trim()} · ${d.getDate()} ${mo[d.getMonth()]} &nbsp;·&nbsp; `;}
  document.getElementById('tktxt').innerHTML=t;
}

function showPopup(race) {
  document.getElementById('pflag').textContent=race.flag||'🏁';
  document.getElementById('pname').textContent=race.circuit||race.raceName;
  const sm={done:'Finalizado',current:'EN CURSO',upcoming:'Próximo'};
  const sc={done:'st-d',current:'st-c',upcoming:'st-u'};
  const ps=document.getElementById('pst');ps.textContent=sm[race.status];ps.className='pst '+sc[race.status];
  const d=new Date(race.date);const mo=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  let meta=`R${race.round} · ${d.getDate()} ${mo[d.getMonth()]} · ${race.city||''}`;
  if(race.p1)meta+=` · 🏆 ${race.p1}`;
  document.getElementById('pmeta').textContent=meta;
  document.getElementById('cpopup').classList.add('show');
}
function closePopup(){document.getElementById('cpopup').classList.remove('show');}
function switchTab(btn,tab){
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');document.getElementById('panel-'+tab).classList.add('active');
}

function renderRaces() {
  const c=document.getElementById('panel-cal');
  c.innerHTML=`<div class="stitle">Temporada 2026 · ${allRaces.length} GPs</div><div class="apib">Datos actualizados R7 · Barcelona 14 Jun</div>`;
  const MO=['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
  allRaces.forEach(r=>{
    const d=new Date(r.date);
    const res=r.p1?`<div class="rres"><span class="win">🏆 ${r.p1}</span> · P2: ${r.p2||'—'} · P3: ${r.p3||'—'}</div>`:'';
    const sp=r.sprint?'<span class="sbadge">SPRINT</span>':'';
    const dc=r.status==='current'?'var(--gold)':r.status==='done'?'var(--mu)':'var(--tx)';
    const sn=r.raceName.replace('Formula 1 ','').replace(' Grand Prix','').replace('Grand Prix','').trim();
    const div=document.createElement('div');div.className=`rc ${r.status}`;
    div.innerHTML=`<div class="rd2"><div class="rdy" style="color:${dc}">${d.getDate()}</div><div class="rmn">${MO[d.getMonth()]}</div></div><div class="ri"><div class="rr">R${r.round}${sp}</div><div class="rn">${sn}</div><div class="rci">${r.circuit}${r.city?' · '+r.city:''}</div>${res}</div><div class="rfl">${r.flag}</div>`;
    div.addEventListener('click',()=>{showPopup(r);globeGoTo(r.lat,r.lng);});
    c.appendChild(div);
  });
}

function renderDrivers() {
  const c=document.getElementById('panel-drv');
  c.innerHTML=`<div class="stitle">Pilotos · Post-Barcelona R7</div><div class="apib">Datos reales verificados</div>`;
  const max=KNOWN_STANDINGS[0].pts;
  KNOWN_STANDINGS.forEach((s,i)=>{
    const pos=i+1, color=gc2(s.team), flag=gf(s.nat);
    const pct=Math.round(s.pts/max*100), pc=pos===1?'p1':pos===2?'p2':pos===3?'p3':'';
    const div=document.createElement('div');div.className='drow';div.style.borderLeftColor=color;
    div.innerHTML=`<div class="pos ${pc}">${pos}</div><div style="font-size:16px">${flag}</div><div style="flex:1"><div class="dn">${s.given.split(' ')[0]} ${s.family}${s.nat==='Argentine'?' ⭐':''}</div><div class="dt" style="color:${color}">${s.tname}</div></div><div style="text-align:right"><div class="dpts" style="color:${pos<=3?'var(--gold)':'var(--tx)'}">${s.pts}</div><div class="ptsl">PTS</div><div class="pb"><div class="pbf" style="width:${pct}%;background:${color}"></div></div></div>`;
    div.addEventListener('click',()=>openDriver(s,color,flag,pos));c.appendChild(div);
  });
}

function openDriver(s, color, flag, pos) {
  const res = (DRIVER_HISTORY[s.id]||[]).sort((a,b)=>a.round-b.round);
  const wins=res.filter(r=>r.pos===1).length, pods=res.filter(r=>r.pos!==null&&r.pos<=3).length;
  let h='';
  if(!res.length) h='<div style="color:var(--mu);font-size:12px;padding:8px">Sin carreras registradas.</div>';
  else res.forEach(r=>{
    let ps,pc;
    if(!r.pos){ps=r.status||'DNF';pc='var(--mu)';}
    else if(r.pos===1){ps='P1 🏆';pc='var(--gold)';}
    else if(r.pos===2){ps='P2';pc='var(--si)';}
    else if(r.pos===3){ps='P3';pc='var(--bz)';}
    else{ps='P'+r.pos;pc='var(--tx)';}
    h+=`<div class="rh"><div class="rhr">R${r.round}</div><div style="font-size:15px">${r.raceFlag}</div><div class="rhn">${r.raceName}</div><div class="rhp" style="color:${pc}">${ps}</div><div class="rhpts">${r.pts>0?'+'+r.pts+' pts':'—'}</div></div>`;
  });
  document.getElementById('dmi').innerHTML=`
    <div class="mh"><div class="mfl">${flag}</div><div style="flex:1">
    <div class="mdn" style="color:${color}">${s.given} ${s.family}</div>
    <div class="mtm" style="color:${color}">${s.tname} · #${s.num} · ${s.nat} · P${pos} campeonato</div>
    </div><button class="mcl" onclick="closeModal()">✕</button></div>
    <div class="ms">
      <div class="msb"><div class="msv" style="color:var(--gold)">${s.pts}</div><div class="msl">Puntos</div></div>
      <div class="msb"><div class="msv" style="color:var(--red)">${wins}</div><div class="msl">Victorias</div></div>
      <div class="msb"><div class="msv">${pods}</div><div class="msl">Podios</div></div>
    </div>
    <div class="ht">Historial 2026 · R1–R7</div>${h}`;
  document.getElementById('dmodal').classList.add('show');
}
function closeModal(e){if(!e||e.target===document.getElementById('dmodal'))document.getElementById('dmodal').classList.remove('show');}

function renderTeams() {
  const c=document.getElementById('panel-con');
  c.innerHTML=`<div class="stitle">Constructores · Post-Barcelona R7</div><div class="apib">Datos reales verificados</div>`;
  const max=KNOWN_CONSTRUCTORS[0].pts;
  KNOWN_CONSTRUCTORS.forEach((team,i)=>{
    const pos=i+1, color=gc2(team.id), pts=team.pts;
    const pct=Math.round(pts/max*100), pc=pos===1?'p1':pos===2?'p2':pos===3?'p3':'';
    const chips=KNOWN_STANDINGS.filter(d=>d.team===team.id)
      .map(d=>`<div class="dch"><div class="dcf">${gf(d.nat)}</div><div class="dcn">${d.family}</div><div class="dcp">${d.pts} pts</div></div>`).join('');
    const div=document.createElement('div');div.className='tc';div.style.borderLeftColor=color;
    div.innerHTML=`<div class="th"><div class="tp ${pc}">${pos}</div><div class="tdot" style="background:${color}"></div><div style="flex:1"><div class="tn">${team.name}</div></div><div style="text-align:right"><div class="tpb" style="color:${pos<=3?'var(--gold)':'var(--tx)'}">${pts}</div><div class="tpl">PTS</div></div></div><div class="pb2"><div class="pb2f" style="width:${pct}%;background:${color}"></div></div><div class="tdr">${chips}</div>`;
    c.appendChild(div);
  });
}

function renderCircuits(){
  const c=document.getElementById('panel-cir');c.innerHTML='<div class="stitle">Circuitos</div>';
  const sel=document.createElement('select');sel.className='csel';
  sel.innerHTML='<option value="">— Seleccionar circuito —</option>';
  Object.entries(CI).forEach(([k,v])=>{const o=document.createElement('option');o.value=k;o.textContent=v.name;sel.appendChild(o);});
  const det=document.createElement('div');
  sel.addEventListener('change',()=>{
    const ci=CI[sel.value];if(!ci){det.innerHTML='';return;}
    det.innerHTML=`<div class="cd"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><div style="font-size:28px">${ci.flag}</div><div><div style="font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:900;text-transform:uppercase">${ci.name}</div><div style="font-size:12px;color:var(--mu)">${ci.city}</div></div></div><div class="sg"><div class="sb2"><div class="sl">Vueltas</div><div class="sv">${ci.laps}</div></div><div class="sb2"><div class="sl">Longitud</div><div class="sv" style="font-size:13px">${ci.len}</div></div><div class="sb2"><div class="sl">Curvas</div><div class="sv">${ci.curvas}</div></div><div class="sb2"><div class="sl">Tipo</div><div class="sv" style="font-size:12px">${ci.tipo}</div></div></div><div class="sb2" style="margin-top:8px"><div class="sl">Vuelta récord</div><div class="sv" style="font-size:12px">${ci.record}</div></div><div style="margin-top:8px;padding:8px 10px;background:var(--sf2);border-radius:6px;font-size:11px;color:var(--mu)">💡 ${ci.nota}</div></div>`;
  });
  c.appendChild(sel);c.appendChild(det);
}

renderCircuits();
loadAll();
